# mise -- tooling version pins and task runner.
# Tools are pinned here; developers and CI run `mise run <task>` rather than
# installing tools ad-hoc. CI's entrypoint is `mise run ci`.
#
# Go tasks are namespaced `fmt:go` / `lint:go` to leave the bare `fmt` name free
# for other formatters (e.g. markdown) added later.
#
# Operator + packaging tooling (kustomize, kind, controller-gen, setup-envtest,
# govulncheck, helm) is added to [tools] and [tasks] in Epics 07 / 11 / 12, and
# `ci` gains manifests:check, vuln, and helm lint/template there.

[settings]
lockfile = true
lockfile_platforms = ["macos-arm64", "linux-x64"]
minimum_release_age = "7d"

[tools]
go = "1.26.5"
golangci-lint = "2.10.1"
helm = "4.2.2"
"go:sigs.k8s.io/controller-tools/cmd/controller-gen" = "v0.21.0"
"go:sigs.k8s.io/controller-runtime/tools/setup-envtest" = "release-0.24"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
"go:github.com/losisin/helm-values-schema-json" = "1.9.2"

[env]
ENVTEST_K8S_VERSION = "1.34.0"

[tasks."fmt:go"]
description = "Format Go code and tidy modules"
run = ["gofmt -w .", "go mod tidy"]

[tasks."fmt:go:check"]
description = "Fail if Go code is not gofmt-clean"
run = 'test -z "$(gofmt -l .)"'

[tasks."lint:go"]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.build]
description = "Build the exporter and operator binaries"
run = [
  "go build -o bin/exporter ./cmd/exporter",
  "go build -o bin/operator ./cmd/operator",
]

[tasks.test]
description = "Run unit tests with the race detector, shuffled"
run = "go test -race -shuffle=on ./..."

[tasks.vuln]
description = "Scan for known vulnerabilities (govulncheck)"
run = "govulncheck ./..."

[tasks."image:build"]
description = "Build the container image for the host architecture and load it into Docker"
run = "docker build --load -t scm-metrics-exporter:dev ."

[tasks."image:buildx"]
description = "Build the multi-arch (amd64+arm64) image; add --push in CI to publish"
run = "docker buildx build --platform linux/amd64,linux/arm64 -t scm-metrics-exporter:dev ."

[tasks.generate]
description = "controller-gen: DeepCopy and other generated code"
run = "controller-gen object:headerFile=hack/boilerplate.go.txt paths=./api/..."

[tasks.manifests]
description = "controller-gen: CRDs, the manager RBAC role, and webhook config"
run = "controller-gen crd rbac:roleName=manager-role webhook paths=./... output:crd:artifacts:config=config/crd/bases output:rbac:artifacts:config=config/rbac output:webhook:artifacts:config=config/webhook"

[tasks."test:envtest"]
description = "Run controller tests against a real API server (envtest)"
run = '''
export KUBEBUILDER_ASSETS="$(setup-envtest use "$ENVTEST_K8S_VERSION" -p path)"
go test -race ./internal/controller/...
'''

[tasks."test:e2e"]
description = "Run the gated end-to-end test against the current kube-context (operator must be installed)"
run = "RUN_E2E=1 go test -count=1 ./test/e2e/..."

[tasks."chart:sync"]
description = "Regenerate the chart CRD + ClusterRole templates from config/ (run after manifests)"
run = "bash hack/chart-sync.sh"

[tasks.schema]
description = "Generate the Helm chart values.schema.json from values.yaml (no annotations)"
# -schemaRoot.additionalProperties=false rejects unknown top-level keys (catches typos in
# values.yaml overrides) while leaving nested free-form maps (nodeSelector, annotations, ...)
# open, so it does not break legitimate arbitrary-key values.
run = "helm-values-schema-json -input charts/scm-metrics-exporter/values.yaml -output charts/scm-metrics-exporter/values.schema.json -draft 7 -schemaRoot.title 'scm-metrics-exporter values' -schemaRoot.additionalProperties=false"

[tasks."schema:check"]
description = "Regenerate values.schema.json and fail if it is stale vs values.yaml"
depends = ["schema"]
run = "git diff --exit-code -- charts/scm-metrics-exporter/values.schema.json"

[tasks."helm:lint"]
description = "Lint the Helm chart"
run = "helm lint charts/scm-metrics-exporter"

[tasks."helm:template"]
description = "Render the Helm chart (smoke check)"
run = "helm template scm charts/scm-metrics-exporter >/dev/null"

[tasks."manifests:check"]
description = "Regenerate code + manifests + chart sync and fail if committed generated files are stale"
depends = ["generate", "manifests", "chart:sync"]
run = "git diff --exit-code -- config 'api/**/zz_generated.deepcopy.go' 'charts/scm-metrics-exporter/templates/crds.yaml' 'charts/scm-metrics-exporter/templates/clusterrole.yaml'"

[tasks.ci]
description = "Run all CI checks locally (go vet is covered by golangci-lint's govet)"
depends = ["fmt:go:check", "lint:go", "manifests:check", "schema:check", "vuln", "build", "test", "helm:lint", "helm:template"]

# CI runs these three groups as separate parallel jobs (see .github/workflows/ci.yml);
# together they cover the same checks as `ci`. `ci` stays the one-shot local entrypoint.
[tasks."ci:lint"]
description = "CI lint group: formatting, golangci-lint, generated-file drift, helm"
depends = ["fmt:go:check", "lint:go", "manifests:check", "schema:check", "helm:lint", "helm:template"]

[tasks."ci:test"]
description = "CI test group"
depends = ["test"]

[tasks."ci:build"]
description = "CI build group: build both binaries and scan for vulnerabilities"
depends = ["build", "vuln"]
