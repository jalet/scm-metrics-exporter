                    properties:
                      archived:
                        description: |-
                          Archived, when set, matches only archived (true) or only non-archived (false)
                          repositories; unset matches both.
                        type: boolean
                      namePatterns:
                        description: |-
                          NamePatterns matches repository names against these shell-style globs (for example
