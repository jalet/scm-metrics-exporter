---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - scm.jalet.io
  resources:
  - githubmetricsexporters
  - gitlabmetricsexporters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - scm.jalet.io
  resources:
  - githubmetricsexporters/finalizers
  - gitlabmetricsexporters/finalizers
  verbs:
  - update
- apiGroups:
  - scm.jalet.io
  resources:
  - githubmetricsexporters/status
  - gitlabmetricsexporters/status
  verbs:
  - get
  - patch
  - update
