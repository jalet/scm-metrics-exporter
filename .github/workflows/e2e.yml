name: E2E

on:
  pull_request:
    paths:
      - charts/**
      - config/**
      - cmd/**
      - internal/controller/**
      - Dockerfile
      - .github/workflows/e2e.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chart-e2e:
    name: chart-testing on kind
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # chart-testing needs history to detect changed charts
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Build operator image
        run: docker build -t scm-metrics-exporter:e2e .

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Load image into kind
        run: kind load docker-image scm-metrics-exporter:e2e --name chart-testing

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.yaml
          kubectl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=180s

      - name: Install chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: ct lint
        run: ct lint --charts charts/scm-metrics-exporter --target-branch "${{ github.event.repository.default_branch }}" --validate-maintainers=false

      - name: ct install
        run: |
          ct install --charts charts/scm-metrics-exporter \
            --helm-extra-set-args "--set image.repository=scm-metrics-exporter --set image.tag=e2e --set image.pullPolicy=Never"

      - name: Webhook rejects a CR with a missing Secret
        run: |
          helm install scm charts/scm-metrics-exporter -n scm-system --create-namespace \
            --set image.repository=scm-metrics-exporter --set image.tag=e2e --set image.pullPolicy=Never \
            --wait --timeout 3m
          cat > /tmp/bad-cr.yaml <<'EOF'
          apiVersion: scm.jalet.io/v1alpha1
          kind: GitHubMetricsExporter
          metadata:
            name: bad
            namespace: scm-system
          spec:
            org: acme
            authMode: token
            tokenKey: token
            credentialsSecret:
              name: does-not-exist
          EOF
          if kubectl apply -f /tmp/bad-cr.yaml; then
            echo "::error::bad CR was admitted; the validating webhook did not reject it"
            exit 1
          fi
          echo "webhook correctly rejected the CR referencing a missing Secret"
