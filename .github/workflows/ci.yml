name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege by default; no job needs more for CI.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      # `mise run ci` fans out lint:go, build, test, vet and vuln concurrently;
      # on a cold cache golangci-lint's go/packages load lost the CPU race and
      # timed out. Warming the Go build/module (and golangci-lint) caches makes
      # package loading near-instant and keeps the parallel run within budget.
      - name: Cache Go build, module, and lint caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.cache/golangci-lint
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-
      # Runs fmt:go:check, vet, lint:go, manifests:check (+ chart:sync drift),
      # vuln, build, test, helm:lint, helm:template. Controller envtest tests are
      # skipped here (no KUBEBUILDER_ASSETS) and covered by the envtest job.
      - run: mise run ci

  envtest:
    name: controller envtest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Cache Go build and module caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-
      - name: Cache envtest binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/kubebuilder-envtest
          key: envtest-${{ runner.os }}-k8s-1.34.0
      - run: mise run test:envtest
