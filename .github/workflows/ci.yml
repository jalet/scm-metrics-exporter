name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege by default; no job needs more for CI.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # lint / test / build run as separate parallel jobs so they get their own CPU
  # instead of thrashing one runner. Each leg maps to a `mise run ci:<group>` task;
  # together they cover the same checks as `mise run ci`.
  checks:
    name: ${{ matrix.group }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [lint, test, build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      # Rotating key: github.run_id makes the primary key always miss, so a cache with
      # the current toolchain's objects is saved every run; restore-keys warms from the
      # newest matching lineage. mise.lock pins the Go version, so a toolchain bump starts
      # a clean lineage and never restores stale, unusable build objects. This avoids the
      # immutable-key trap where a static go.sum key holds mismatched objects forever.
      - name: Cache Go build, module, and lint caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.cache/golangci-lint
          key: go-${{ runner.os }}-${{ matrix.group }}-${{ hashFiles('mise.lock', 'go.sum') }}-${{ github.run_id }}
          restore-keys: |
            go-${{ runner.os }}-${{ matrix.group }}-${{ hashFiles('mise.lock', 'go.sum') }}-
            go-${{ runner.os }}-${{ matrix.group }}-
      - run: mise run ci:${{ matrix.group }}

  envtest:
    name: controller envtest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Cache Go build and module caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-envtest-${{ hashFiles('mise.lock', 'go.sum') }}-${{ github.run_id }}
          restore-keys: |
            go-${{ runner.os }}-envtest-${{ hashFiles('mise.lock', 'go.sum') }}-
            go-${{ runner.os }}-envtest-
      - name: Cache envtest binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/kubebuilder-envtest
          key: envtest-${{ runner.os }}-k8s-1.34.0
      - run: mise run test:envtest
