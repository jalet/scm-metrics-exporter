# golangci-lint v2 configuration.
# Extended in Epic 12 (CI) if additional linters are warranted.
version: "2"

run:
  # Generous ceiling: on a cold CI cache golangci-lint type-checks the full
  # (k8s-heavy) dependency graph via go/packages while build/test/vet/vuln run
  # concurrently. 5m was too tight and timed out during package loading; the Go
  # build cache (restored in CI) is the real fix, this is insurance against hangs.
  timeout: 10m

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - bodyclose
    - errorlint
    - gosec
    - noctx
    - revive
  exclusions:
    generated: lax
    rules:
      # Generated deepcopy / CRD scaffolding should not be linted strictly.
      - path: zz_generated.*\.go
        linters:
          - errcheck
          - gosec
          - revive
      # "metrics" is our own internal package; revive's stdlib-name-conflict
      # check (runtime/metrics) is a false positive here.
      - linters:
          - revive
        text: "avoid package names that conflict with Go standard library"
      # Tests legitimately read fixture files and drive local httptest servers.
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jalet/scm-metrics-exporter
