# golangci-lint v2 configuration.
# Extended in Epic 12 (CI) if additional linters are warranted.
version: "2"

run:
  # Generous ceiling for the cold-cache CI path. `mise run ci` runs lint:go,
  # build, test and vet concurrently; on a cold cache all four cold-compile the
  # k8s-heavy dependency graph and starve each other for CPU on a 4-core runner.
  # golangci-lint's analysis completes fine (0 issues) but its wall-clock deadline
  # races the sibling compiles: 5m and 10m both lost that race (~740s observed).
  # The restored Go build cache makes warm runs fast; 20m lets the occasional
  # cold run (fresh cache / post-eviction) finish, succeed, and repopulate it.
  timeout: 20m

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - bodyclose
    - errorlint
    - gosec
    - noctx
    - revive
  exclusions:
    generated: lax
    rules:
      # Generated deepcopy / CRD scaffolding should not be linted strictly.
      - path: zz_generated.*\.go
        linters:
          - errcheck
          - gosec
          - revive
      # "metrics" is our own internal package; revive's stdlib-name-conflict
      # check (runtime/metrics) is a false positive here.
      - linters:
          - revive
        text: "avoid package names that conflict with Go standard library"
      # Tests legitimately read fixture files and drive local httptest servers.
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jalet/scm-metrics-exporter
