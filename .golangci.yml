---
# golangci-lint v2 configuration.
# Extended in Epic 12 (CI) if additional linters are warranted.
version: "2"

run:
  timeout: 5m

linters:
  default: standard  # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - bodyclose
    - errorlint
    - gosec
    - noctx
    - revive
  exclusions:
    generated: lax
    rules:
      # Generated deepcopy / CRD scaffolding should not be linted strictly.
      - path: zz_generated.*\.go
        linters:
          - errcheck
          - gosec
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jalet/scm-metrics-exporter
