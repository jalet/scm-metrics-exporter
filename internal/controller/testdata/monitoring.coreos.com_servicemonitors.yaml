# Minimal stand-in CRD so envtest can serve monitoring.coreos.com/v1 ServiceMonitor
# without vendoring the full prometheus-operator CRD. The spec accepts arbitrary
# content (preserve-unknown-fields), which is all the operator's rendering needs.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: servicemonitors.monitoring.coreos.com
spec:
  group: monitoring.coreos.com
  names:
    kind: ServiceMonitor
    listKind: ServiceMonitorList
    plural: servicemonitors
    singular: servicemonitor
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
