{{- if .Values.rbac.create }}
{{- if .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "scm-metrics-exporter.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scm-metrics-exporter.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "scm-metrics-exporter.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scm-metrics-exporter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "scm-metrics-exporter.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "scm-metrics-exporter.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
