# Default values for scm-metrics-exporter (the operator).

# global is reserved by Helm: when this chart is used as a dependency, Helm coalesces a
# (possibly empty) global map into the subchart's values. It must be present here so the
# strict values.schema.json (additionalProperties: false at the root) accepts it; otherwise
# the chart is unusable as a dependency ("additional properties 'global' not allowed").
global: {}

image:
  repository: ghcr.io/jalet/scm-metrics-exporter
  # tag defaults to .Chart.AppVersion when empty.
  tag: ""
  # digest, when set, pins the image and overrides tag.
  digest: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

# exporterImage is the image the operator injects into the exporter Deployments it
# creates. When repository is empty it reuses the operator image (single-image model).
exporterImage:
  repository: ""
  tag: ""

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

leaderElection:
  enabled: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
podAnnotations: {}
priorityClassName: ""

# CRDs are templated and gated (cert-manager pattern). crds.keep adds
# helm.sh/resource-policy: keep so `helm uninstall` never deletes them (and the CRs).
crds:
  enabled: true
  keep: true

# The operator's own controller-runtime metrics endpoint. Exposed on the pod; scraped only
# when operator.serviceMonitor is enabled (the product's own metrics are OTLP-push). Set
# bindAddress to "0" to disable the endpoint entirely.
metrics:
  bindAddress: ":8080"
  port: 8080

# operator groups settings for the operator's own observability.
operator:
  # serviceMonitor creates a Prometheus Operator ServiceMonitor (plus a backing ClusterIP
  # Service) for the operator's controller-runtime metrics (plain HTTP on metrics.port). It
  # renders only when enabled AND the cluster has the Prometheus Operator CRD
  # (monitoring.coreos.com/v1), so leaving it enabled on a cluster without Prometheus
  # Operator is a no-op rather than an install failure.
  serviceMonitor:
    enabled: true
    # interval and scrapeTimeout are optional; empty uses the Prometheus defaults.
    interval: ""
    scrapeTimeout: ""
    # labels adds extra labels to the ServiceMonitor object, for a Prometheus's
    # serviceMonitorSelector to match on.
    labels: {}
    # relabelings and metricRelabelings are Prometheus RelabelConfig lists applied to the
    # scrape and to scraped samples, respectively.
    relabelings: []
    metricRelabelings: []

valkey:
  # deploy a bundled single-replica Valkey for lifecycle dedup state; set false (the
  # default) to bring your own and reference it via each CR's spec.valkey.endpoint. The
  # bundled StatefulSet is single-replica with no HA or backups, so production
  # deployments should prefer BYO (a properly operated Valkey/Redis) over this option.
  deploy: false
  image: valkey/valkey:8-alpine
  storage: 1Gi

# Optional demo CR; off by default so `helm install` does not spin up collection Jobs.
sampleCR:
  enabled: false
  provider: github
  org: acme
  authMode: token
  tokenKey: token
  credentialsSecret: acme-github-credentials
  # OTLP metrics endpoint the collection Jobs push to (required).
  otlpEndpoint: http://otel-collector.observability:4318
